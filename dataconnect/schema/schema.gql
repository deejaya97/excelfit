type Member @table {
  id: UUID! @default(expr: "uuidV4()")
  memberCode: String! @col(dataType: "varchar(20)")
  firstName: String! @col(dataType: "varchar(80)")
  lastName: String! @col(dataType: "varchar(80)")
  phone: String! @col(dataType: "varchar(32)")
  email: String @col(dataType: "varchar(160)")
  emergencyContact: String @col(dataType: "varchar(80)")
  status: String! @col(dataType: "varchar(24)")
  joinedOn: Date!
  notes: String
  createdAt: Timestamp! @default(expr: "request.time")
}

type MembershipPlan @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String! @col(dataType: "varchar(80)")
  durationDays: Int!
  price: Float!
  benefits: String
  active: Boolean!
  createdAt: Timestamp! @default(expr: "request.time")
}

type Membership @table {
  id: UUID! @default(expr: "uuidV4()")
  member: Member!
  plan: MembershipPlan!
  startDate: Date!
  endDate: Date!
  status: String! @col(dataType: "varchar(24)")
  createdAt: Timestamp! @default(expr: "request.time")
}

type Payment @table {
  id: UUID! @default(expr: "uuidV4()")
  member: Member!
  membership: Membership
  amount: Float!
  method: String! @col(dataType: "varchar(32)")
  paidOn: Date!
  reference: String @col(dataType: "varchar(80)")
  notes: String
  invoiceNumber: String! @col(dataType: "varchar(40)")
  createdAt: Timestamp! @default(expr: "request.time")
}

type CheckIn @table {
  id: UUID! @default(expr: "uuidV4()")
  member: Member!
  checkedInAt: Timestamp! @default(expr: "request.time")
  status: String! @col(dataType: "varchar(24)")
  message: String!
}
