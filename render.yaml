services:
  # ── API (Node.js Web Service) ────────────────────────────────────────────────
  - type: web
    name: excelfit-api
    runtime: node
    rootDir: functions
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set this in Render dashboard → Environment
      - key: STAFF_EMAIL
        sync: false          # Set this in Render dashboard → Environment
      - key: STAFF_PASSWORD
        sync: false          # Set this in Render dashboard → Environment
      - key: SESSION_SECRET
        sync: false          # Set this in Render dashboard → Environment
      - key: CORS_ORIGIN
        sync: false          # Set to your Render static site URL, e.g. https://excelfit.onrender.com
    plan: free

  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: excelfit-web
    runtime: static
    rootDir: web-app
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false          # Set to your Render API URL, e.g. https://excelfit-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
